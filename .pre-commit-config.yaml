exclude: ^strategy-pack/

repos:
  # Baseline-tracked secret detection — catches API keys, tokens, passwords
  # Run `detect-secrets scan > .secrets.baseline` to initialise the baseline.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            tests/.*|
            \.github/workflows/.*|
            sdk/.*|
            docs/.*|
            .*\.example|
            .*\.toml|
            alembic/versions/.*
          )$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: detect-aws-credentials
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-r, app, -ll, -q]
        pass_filenames: false

  - repo: local
    hooks:
      - id: env-schema-check
        name: env schema check
        entry: python scripts/check_env_schema.py
        language: system
        pass_filenames: false
      - id: secret-pattern-check
        name: secret pattern check
        entry: python scripts/check_secret_patterns.py
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        pass_filenames: false
