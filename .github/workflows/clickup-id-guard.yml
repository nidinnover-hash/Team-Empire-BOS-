name: ClickUp ID Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-clickup-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title contains ClickUp ID
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || "";
            const re = /\bCU-\d+\b/i;
            if (!re.test(title)) {
              core.setFailed(
                "PR title must include a ClickUp task ID like CU-123. " +
                `Current title: "${title}"`
              );
            }

      - name: Validate commit messages contain ClickUp ID
        uses: actions/github-script@v7
        with:
          script: |
            const re = /\bCU-\d+\b/i;
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              }
            );

            const invalid = commits.filter((c) => !re.test(c.commit.message || ""));
            if (invalid.length > 0) {
              const lines = invalid
                .slice(0, 10)
                .map((c) => `- ${c.sha.substring(0, 7)}: ${c.commit.message.split("\n")[0]}`);
              core.setFailed(
                "Each commit message must include a ClickUp task ID like CU-123.\n" +
                lines.join("\n")
              );
            }
