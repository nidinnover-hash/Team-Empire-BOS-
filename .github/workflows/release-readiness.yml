name: Release Readiness

on:
  workflow_dispatch:

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Check migration heads
        run: python scripts/check_migration_heads.py

      - name: Production config smoke
        env:
          DEBUG: "false"
          ENFORCE_STARTUP_VALIDATION: "true"
          AUTO_CREATE_SCHEMA: "false"
          AUTO_SEED_DEFAULTS: "false"
          COOKIE_SECURE: "true"
          SECRET_KEY: "0123456789abcdef0123456789abcdef"
          ADMIN_EMAIL: "owner@example.com"
          ADMIN_PASSWORD: "StrongPassword123!"
          TOKEN_ENCRYPTION_KEY: "abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "sk-live-valid-key-value"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nidin_nover_ai
          PURPOSE_PERSONAL_EMAILS: "nidinnover@gmail.com"
        run: python scripts/smoke_prod_config.py --import-app

      - name: Deploy preflight smoke (CI mode)
        env:
          DEBUG: "false"
          ENFORCE_STARTUP_VALIDATION: "true"
          AUTO_CREATE_SCHEMA: "false"
          AUTO_SEED_DEFAULTS: "false"
          COOKIE_SECURE: "true"
          SECRET_KEY: "0123456789abcdef0123456789abcdef"
          ADMIN_EMAIL: "owner@example.com"
          ADMIN_PASSWORD: "StrongPassword123!"
          TOKEN_ENCRYPTION_KEY: "abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "sk-live-valid-key-value"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nidin_nover_ai
          PURPOSE_PERSONAL_EMAILS: "nidinnover@gmail.com"
        run: python scripts/preflight_deploy.py --skip-db

      - name: Check ops readiness controls
        run: python scripts/check_ops_readiness.py

      - name: Full quality gate
        run: python scripts/check_ready.py

      - name: Build release checklist artifact
        run: |
          mkdir -p artifacts
          cat > artifacts/release-checklist.txt << 'EOF'
          Release Readiness Checklist
          - Quality gate green (ruff, mypy, pytest)
          - Single Alembic head
          - Startup validation passes in production-like env
          - Rollback command documented and tested
          - Key dashboards reviewed (error budget, latency, privacy redaction)
          - Ops docs verified (SLO/error budget, incident playbook, backup/restore drill)
          EOF

      - name: Upload checklist
        uses: actions/upload-artifact@v4
        with:
          name: release-checklist
          path: artifacts/release-checklist.txt
