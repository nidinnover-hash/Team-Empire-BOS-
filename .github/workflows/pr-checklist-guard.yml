name: PR Checklist Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr-checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect PR body and file list
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = context.payload.pull_request.body || "";
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              }
            );
            const paths = files.map((f) => f.filename);
            fs.writeFileSync("pr_body.txt", body, "utf8");
            fs.writeFileSync("pr_paths.json", JSON.stringify(paths, null, 2), "utf8");

      - name: Validate PR checklist requirements
        run: python scripts/pr_checklist_guard.py pr_body.txt pr_paths.json
