name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove strategy pack from CI workspace
        run: rm -rf strategy-pack

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Dependency integrity
        run: python -m pip check

      - name: Dependency security audit
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: Lint
        run: ruff check app tests

      - name: Type check
        run: python -m mypy

      - name: Security lint (bandit)
        run: bandit -r app -ll -q

      - name: Pre-commit policy checks (main tree only)
        run: |
          files=$(git ls-files | grep -v '^strategy-pack/' || true)
          if [ -z "$files" ]; then
            echo "No files selected for pre-commit checks."
            exit 0
          fi
          pre-commit run --files $files

      - name: Critical regression suite
        run: |
          python -m pytest -q \
            tests/test_api_smoke_fast.py \
            tests/test_super_admin.py \
            tests/test_integrations.py \
            tests/test_talk_mode.py \
            tests/test_config_validation.py \
            -p no:cacheprovider

  full-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: fast-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove strategy pack from CI workspace
        run: rm -rf strategy-pack

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Migration check
        env:
          DATABASE_URL: sqlite:///./ci.db
        run: |
          python scripts/check_migration_heads.py
          python -m alembic upgrade head
          python -m alembic downgrade -1
          python -m alembic upgrade head

      - name: Startup smoke (production-mode config)
        env:
          DEBUG: "false"
          ENFORCE_STARTUP_VALIDATION: "true"
          AUTO_CREATE_SCHEMA: "false"
          AUTO_SEED_DEFAULTS: "false"
          COOKIE_SECURE: "true"
          SECRET_KEY: "0123456789abcdef0123456789abcdef"
          ADMIN_EMAIL: "owner@example.com"
          ADMIN_PASSWORD: "StrongPassword123!"
          TOKEN_ENCRYPTION_KEY: "abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "sk-live-valid-key-value"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nidin_nover_ai
          PURPOSE_PERSONAL_EMAILS: "nidinnover@gmail.com"
        run: python scripts/smoke_prod_config.py --import-app

      - name: Fast API smoke suite
        run: python -m pytest -q tests/test_api_smoke_fast.py -p no:cacheprovider

      - name: Tests with coverage
        run: python -m pytest -q -p no:cacheprovider --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=61

      - name: Governance and Control Suite
        run: |
          python -m pytest -q \
            tests/test_compliance_engine.py \
            tests/test_control_api.py \
            tests/test_sync_scheduler.py \
            -p no:cacheprovider

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Performance Budget
        run: python -m pytest -q tests/test_performance_budget.py -p no:cacheprovider --durations=10 | tee perf-baseline.txt

      - name: Upload Performance Baseline
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: perf-baseline.txt

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [full-checks, frontend-visual]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nidin-nover-ai:ci-${{ github.sha }} .

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Remove strategy pack from CI workspace
        run: rm -rf strategy-pack
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

  frontend-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: full-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install --with-deps chromium

      - name: Start app
        env:
          DEBUG: "true"
          ENFORCE_STARTUP_VALIDATION: "false"
          COOKIE_SECURE: "false"
          SECRET_KEY: "0123456789abcdef0123456789abcdef"
          ADMIN_PASSWORD: "StrongPassword123!"
          TOKEN_ENCRYPTION_KEY: "abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "sk-live-valid-key-value"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: sqlite:///./ci.db
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/web/login > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not start in time"
          cat uvicorn.log
          exit 1

      - name: Run visual regression tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test tests/ui

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

  frontend-visual-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install --with-deps chromium

      - name: Start app
        env:
          DEBUG: "true"
          ENFORCE_STARTUP_VALIDATION: "false"
          COOKIE_SECURE: "false"
          SECRET_KEY: "0123456789abcdef0123456789abcdef"
          ADMIN_PASSWORD: "StrongPassword123!"
          TOKEN_ENCRYPTION_KEY: "abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "sk-live-valid-key-value"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: sqlite:///./ci.db
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/web/login > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not start in time"
          cat uvicorn.log
          exit 1

      - name: Update visual baselines
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test tests/ui --update-snapshots

      - name: Upload updated visual baselines
        uses: actions/upload-artifact@v4
        with:
          name: playwright-updated-snapshots
          path: tests/ui
