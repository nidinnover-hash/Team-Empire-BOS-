name: CI

on:
  push:
  pull_request:

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pip-audit

      - name: Dependency integrity
        run: python -m pip check

      - name: Dependency security audit
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: Lint
        run: ruff check app tests

      - name: Type check
        run: python -m mypy app tests

      - name: Security lint (bandit)
        run: |
          pip install bandit
          bandit -r app -ll -q || true

  full-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: fast-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pytest-cov

      - name: Migration check
        env:
          DATABASE_URL: sqlite:///./ci.db
        run: python -m alembic upgrade head

      - name: Startup smoke (production-mode config)
        env:
          DEBUG: "false"
          ENFORCE_STARTUP_VALIDATION: "true"
          COOKIE_SECURE: "true"
          SECRET_KEY: "0123456789abcdef0123456789abcdef"
          ADMIN_PASSWORD: "StrongPassword123!"
          TOKEN_ENCRYPTION_KEY: "abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "sk-live-valid-key-value"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: sqlite:///./ci.db
        run: python -c "import app.main"

      - name: Tests with coverage
        run: python -m pytest -q -p no:cacheprovider --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Performance Budget
        run: python -m pytest -q tests/test_performance_budget.py -p no:cacheprovider --durations=10 | tee perf-baseline.txt

      - name: Upload Performance Baseline
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: perf-baseline.txt

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: full-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t personal-clone:ci-${{ github.sha }} .

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
