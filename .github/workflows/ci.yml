name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      PYTHONHASHSEED: "0"
      TZ: "UTC"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove strategy pack from CI workspace
        run: rm -rf strategy-pack

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          npm install

      - name: Dependency integrity
        run: python -m pip check

      - name: Dependency security audit
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: Lint
        run: ruff check app tests

      - name: Type check
        run: python -m mypy

      - name: Security lint (bandit)
        run: bandit -r app -ll -q

      - name: Frontend lint
        run: npm run lint:frontend

      - name: Frontend safety guards
        run: python scripts/check_frontend_guards.py

      - name: Endpoint size guards
        run: python scripts/check_endpoint_file_sizes.py

      - name: Pre-commit policy checks (main tree only)
        run: |
          files=$(git ls-files | grep -v '^strategy-pack/' || true)
          if [ -z "$files" ]; then
            echo "No files selected for pre-commit checks."
            exit 0
          fi
          pre-commit run --files $files

      - name: Critical regression suite
        run: |
          python -m pytest -q \
            tests/test_api_smoke_fast.py \
            tests/test_super_admin.py \
            tests/test_integrations.py \
            tests/test_talk_mode.py \
            tests/test_config_validation.py \
            -m "not flaky" \
            -p no:cacheprovider

  full-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: fast-checks
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      PYTHONHASHSEED: "0"
      TZ: "UTC"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove strategy pack from CI workspace
        run: rm -rf strategy-pack

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Migration check
        env:
          DATABASE_URL: sqlite:///./ci.db
        run: |
          python scripts/check_migration_heads.py
          python -m alembic upgrade head
          python -m alembic downgrade -1
          python -m alembic upgrade head

      # CI-only dummy secrets — NOT used in production. Safe to hardcode here
      # because they only satisfy the startup validation checks; no real
      # services are contacted.
      - name: Startup smoke (production-mode config)
        env:
          DEBUG: "false"
          ENFORCE_STARTUP_VALIDATION: "true"
          AUTO_CREATE_SCHEMA: "false"
          AUTO_SEED_DEFAULTS: "false"
          COOKIE_SECURE: "true"
          SECRET_KEY: "ci-only-0123456789abcdef0123456789abcdef"
          ADMIN_EMAIL: "ci-only@example.com"
          ADMIN_PASSWORD: "CiOnlyPassword123!"
          TOKEN_ENCRYPTION_KEY: "ci-only-abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "openai-ci-only-not-a-real-key"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nidin_bos
          PURPOSE_PERSONAL_EMAILS: "ci@example.com"
        run: python scripts/smoke_prod_config.py --import-app

      - name: Deploy preflight smoke (CI mode)
        env:
          DEBUG: "false"
          ENFORCE_STARTUP_VALIDATION: "true"
          AUTO_CREATE_SCHEMA: "false"
          AUTO_SEED_DEFAULTS: "false"
          COOKIE_SECURE: "true"
          SECRET_KEY: "ci-only-0123456789abcdef0123456789abcdef"
          ADMIN_EMAIL: "ci-only@example.com"
          ADMIN_PASSWORD: "CiOnlyPassword123!"
          TOKEN_ENCRYPTION_KEY: "ci-only-abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "openai-ci-only-not-a-real-key"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nidin_bos
          PURPOSE_PERSONAL_EMAILS: "ci@example.com"
        run: python scripts/preflight_deploy.py --skip-db

      - name: Fast API smoke suite
        run: python -m pytest -q tests/test_api_smoke_fast.py -m "not flaky" -p no:cacheprovider

      - name: Tests with coverage
        run: python -m pytest -q -m "not flaky" -p no:cacheprovider --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=65

      - name: Coverage stretch target (70%, non-blocking)
        continue-on-error: true
        run: python -m pytest -q -m "not flaky" -p no:cacheprovider --cov=app --cov-config=.coveragerc --cov-report=term --cov-fail-under=70

      - name: Governance and Control Suite
        run: |
          python -m pytest -q \
            tests/test_compliance_engine.py \
            tests/test_control_api.py \
            tests/test_sync_scheduler.py \
            -m "not flaky" \
            -p no:cacheprovider

      - name: Flaky quarantine suite (non-blocking, rerun 3x)
        continue-on-error: true
        run: |
          for i in 1 2 3; do
            echo "Flaky suite run #$i"
            python -m pytest -q -m "flaky" -p no:cacheprovider || true
          done

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Performance Budget
        run: python -m pytest -q tests/test_performance_budget.py -p no:cacheprovider --durations=10 | tee perf-baseline.txt

      - name: Upload Performance Baseline
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: perf-baseline.txt

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [full-checks, frontend-visual]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nidin-bos:ci-${{ github.sha }} .

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove strategy pack from CI workspace
        run: rm -rf strategy-pack
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: full-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      # CI-only dummy secrets — NOT used in production
      - name: Start app
        env:
          DEBUG: "true"
          ENFORCE_STARTUP_VALIDATION: "false"
          COOKIE_SECURE: "false"
          SECRET_KEY: "ci-only-0123456789abcdef0123456789abcdef"
          ADMIN_PASSWORD: "CiOnlyPassword123!"
          TOKEN_ENCRYPTION_KEY: "ci-only-abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "openai-ci-only-not-a-real-key"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: sqlite:///./ci.db
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/web/login > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not start in time"
          cat uvicorn.log
          exit 1

      - name: Run visual regression tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test tests/ui --grep-invert "accessibility"

      - name: Run accessibility checks (non-blocking baseline)
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test tests/ui/a11y.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

  frontend-visual-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      # CI-only dummy secrets — NOT used in production
      - name: Start app
        env:
          DEBUG: "true"
          ENFORCE_STARTUP_VALIDATION: "false"
          COOKIE_SECURE: "false"
          SECRET_KEY: "ci-only-0123456789abcdef0123456789abcdef"
          ADMIN_PASSWORD: "CiOnlyPassword123!"
          TOKEN_ENCRYPTION_KEY: "ci-only-abcdef0123456789abcdef0123456789"
          OPENAI_API_KEY: "openai-ci-only-not-a-real-key"
          DEFAULT_AI_PROVIDER: "openai"
          DATABASE_URL: sqlite:///./ci.db
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/web/login > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not start in time"
          cat uvicorn.log
          exit 1

      - name: Update visual baselines
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test tests/ui --update-snapshots --grep-invert "accessibility"

      - name: Upload updated visual baselines
        uses: actions/upload-artifact@v4
        with:
          name: playwright-updated-snapshots
          path: tests/ui
