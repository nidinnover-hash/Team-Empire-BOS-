name: Flaky Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  flaky-reruns:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      PYTHONHASHSEED: "0"
      TZ: "UTC"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run flaky tests repeatedly
        run: |
          for i in 1 2 3 4 5; do
            echo "Nightly flaky run #$i"
            python -m pytest -q -m "flaky" -p no:cacheprovider
          done
