{% extends "base.html" %}
{% block active_page %}projects{% endblock %}
{% block title %}Projects — Nidin BOS{% endblock %}

{% block content %}
  <div class="main-wrap" id="main-content">
    <div class="page-header">
      <h1>Projects</h1>
      <button class="btn-primary" id="add-btn" type="button">+ New Project</button>
    </div>
    <div class="kpi-row stagger-enter">
      <div class="kpi"><div class="label">Total</div><div class="val" id="k-total" data-count-to="0">0</div></div>
      <div class="kpi"><div class="label">Active</div><div class="val" id="k-active" data-count-to="0">0</div></div>
      <div class="kpi"><div class="label">Completed</div><div class="val" id="k-done" data-count-to="0">0</div></div>
    </div>
    <div class="card card-spaced">
      <table class="data-table">
        <thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Due Date</th><th>Actions</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
<script nonce="{{ csp_nonce }}" src="/static/js/micro.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/projects-page.js"></script>
{% endblock %}
