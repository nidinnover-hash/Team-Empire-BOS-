<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Agent Factory — Nidin BOS" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Automations — Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <link rel="stylesheet" href="/static/css/automations.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
</head>
<body>
  {% set active_page = "automations" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header">
      <h1>Automations</h1>
    </div>

    <!-- KPI Row -->
    <div class="kpi-row">
      <div class="kpi"><div class="label">Active Triggers</div><div class="val" id="k-triggers">0</div></div>
      <div class="kpi"><div class="label">Total Fires</div><div class="val" id="k-fires">0</div></div>
      <div class="kpi"><div class="label">Running Workflows</div><div class="val" id="k-running">0</div></div>
      <div class="kpi"><div class="label">Completed</div><div class="val" id="k-completed">0</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab active" data-tab="triggers" type="button" aria-label="Show triggers">Triggers</button>
      <button class="tab" data-tab="workflows" type="button" aria-label="Show workflows">Workflows</button>
    </div>

    <!-- Triggers Panel -->
    <div id="panel-triggers" class="panel">
      <div class="panel-actions">
        <button class="btn-primary" id="btn-new-trigger" type="button" aria-label="Create new trigger">New Trigger</button>
      </div>
      <div id="trigger-list" class="item-list"><div class="empty loading">Loading triggers...</div></div>
    </div>

    <!-- Workflows Panel -->
    <div id="panel-workflows" class="panel" style="display:none">
      <div class="panel-actions">
        <button class="btn-primary" id="btn-new-workflow" type="button" aria-label="Create new workflow">New Workflow</button>
      </div>
      <div id="workflow-list" class="item-list"><div class="empty loading">Loading workflows...</div></div>
    </div>

    <!-- Trigger Create Modal -->
    <div id="modal-trigger" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h2>New Trigger</h2>
          <button class="modal-close" id="modal-trigger-close" type="button" aria-label="Close">&times;</button>
        </div>
        <form id="form-trigger" class="modal-body">
          <label>Name <input type="text" name="name" required maxlength="100" /></label>
          <label>Source Event <input type="text" name="source_event" required maxlength="100" placeholder="e.g. task_created" /></label>
          <label>Action Type <input type="text" name="action_type" required maxlength="100" placeholder="e.g. notify" /></label>
          <label>Description <input type="text" name="description" maxlength="300" /></label>
          <label class="checkbox-label"><input type="checkbox" name="requires_approval" /> Requires Approval</label>
          <div class="modal-footer">
            <button type="submit" class="btn-primary">Create</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Workflow Create Modal -->
    <div id="modal-workflow" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h2>New Workflow</h2>
          <button class="modal-close" id="modal-workflow-close" type="button" aria-label="Close">&times;</button>
        </div>
        <form id="form-workflow" class="modal-body">
          <label>Name <input type="text" name="name" required maxlength="100" /></label>
          <label>Description <input type="text" name="description" maxlength="300" /></label>
          <label>Steps (JSON array)
            <textarea name="steps" rows="4" required placeholder='[{"name":"Step 1","action_type":"assign_task","params":{}}]'></textarea>
          </label>
          <div class="modal-footer">
            <button type="submit" class="btn-primary">Create</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/theme.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/api-client.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/automations-page.js"></script>
</body>
</html>
