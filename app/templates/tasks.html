<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Clone - Tasks</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg: #fafafa; --bg1: #fafafa; --bg2: #ffffff;
      --surface: #ffffff; --line: #e5e5e5; --text: #111111;
      --muted: #666666; --faint: #999999; --brand: #111111;
      --accent-dim: rgba(0,0,0,0.06);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",system-ui,sans-serif;color:var(--text);min-height:100vh;background:#fafafa}

    .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;z-index:60;background:#fafafa;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;overflow-y:auto}
    .sb-brand{display:flex;align-items:center;gap:.75rem;padding:1.15rem 1rem 1.1rem;border-bottom:1px solid #e5e5e5}
    .sb-pulse{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#111111;box-shadow:0 0 0 0 rgba(17,17,17,.4);animation:pulse 2.4s infinite}
    @keyframes pulse{70%{box-shadow:0 0 0 10px rgba(17,17,17,0)}100%{box-shadow:0 0 0 0 rgba(17,17,17,0)}}
    .sb-name{font-family:"Space Grotesk",sans-serif;font-size:.87rem;font-weight:700;color:#111111;letter-spacing:.01em}
    .sb-sub{font-size:.6rem;color:#999999;margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
    .sb-nav{flex:1;padding:.8rem .55rem;display:flex;flex-direction:column;gap:.1rem}
    .sb-item{display:flex;align-items:center;gap:.68rem;padding:.52rem .75rem;border-radius:8px;color:#666666;text-decoration:none;font-size:.8rem;font-weight:500;line-height:1;transition:background .14s ease,color .14s ease;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
    .sb-item:hover{background:rgba(0,0,0,0.04);color:#111111}
    .sb-item.active{background:rgba(0,0,0,0.06);color:#111111;font-weight:600}
    .sb-item svg{width:15px;height:15px;flex-shrink:0;opacity:.8}
    .sb-item.active svg{opacity:1}
    .sb-divider{height:1px;background:#e5e5e5;margin:.45rem .75rem}
    .sb-footer{padding:.65rem .55rem 1rem;border-top:1px solid #e5e5e5}

    .main-wrap{margin-left:220px;padding:1.5rem 2rem;max-width:1000px}
    h1{font-size:1.1rem;font-weight:700;color:#111111;margin-bottom:1rem}
    .filters{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
    .filter-btn{background:#ffffff;border:1px solid #e5e5e5;color:#666666;border-radius:999px;padding:.35rem .75rem;font-size:.72rem;cursor:pointer;transition:all .15s;touch-action:manipulation}
    .filter-btn.active,.filter-btn:hover{background:#111111;border-color:#111111;color:#ffffff}
    .task-list{display:flex;flex-direction:column;gap:4px}
    .task-item{background:#ffffff;border:1px solid #e5e5e5;border-radius:8px;padding:.7rem .9rem;display:flex;align-items:flex-start;gap:.7rem;transition:background .12s;cursor:pointer;touch-action:manipulation}
    .task-item:hover{background:#f5f5f5}
    .p-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
    .p-high{background:#ef4444} .p-med{background:#f59e0b} .p-low{background:#22c55e} .p-none{background:#999999}
    .task-info{flex:1;min-width:0}
    .task-title{font-size:.85rem;color:#111111;line-height:1.35}
    .task-meta{font-size:.68rem;color:#999999;margin-top:.2rem}
    .task-source{font-size:.6rem;padding:.1rem .35rem;border-radius:4px;border:1px solid #e5e5e5;color:#666666;margin-left:.4rem}
    .task-done .task-title{text-decoration:line-through;color:#999999}
    .empty{color:#999999;text-align:center;padding:3rem;font-size:.82rem}
    .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.2rem}
    .kpi{background:#ffffff;border:1px solid #e5e5e5;border-radius:10px;padding:.65rem .85rem}
    .kpi .label{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:#999999}
    .kpi .val{font-size:1.2rem;font-weight:700;color:#111111;margin-top:.15rem}

    @media (max-width: 768px) {
      .main-wrap { padding: 1rem; padding-top: 3.5rem; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .filter-btn { padding: .45rem .85rem; font-size: .78rem; }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="sb-pulse"></div>
      <div>
        <div class="sb-name">Personal Clone</div>
        <div class="sb-sub">Command Center</div>
      </div>
    </div>
    <div class="sb-nav">
      <a href="/" class="sb-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a href="/web/talk" class="sb-item"><i data-lucide="message-circle"></i> Talk Mode</a>
      <a href="/web/integrations" class="sb-item"><i data-lucide="plug"></i> Integrations</a>
      <a href="/web/data-hub" class="sb-item"><i data-lucide="database"></i> Data Hub</a>
      <a href="/web/observe" class="sb-item"><i data-lucide="activity"></i> Observe</a>
      <a href="/web/ops-intel" class="sb-item"><i data-lucide="bar-chart-3"></i> Ops Intel</a>
      <a href="/web/tasks" class="sb-item active"><i data-lucide="check-square"></i> Tasks</a>
      <div class="sb-divider"></div>
      <a href="/docs" class="sb-item" target="_blank"><i data-lucide="book-open"></i> API Docs</a>
    </div>
    <div class="sb-footer">
      <button class="sb-item" id="logout-btn" type="button"><i data-lucide="log-out"></i> Sign out</button>
    </div>
  </nav>

  <div class="main-wrap">
    <h1>Task Inbox</h1>
    <div class="kpi-row">
      <div class="kpi"><div class="label">Open</div><div class="val" id="k-open">0</div></div>
      <div class="kpi"><div class="label">High Priority</div><div class="val" id="k-high">0</div></div>
      <div class="kpi"><div class="label">Sources</div><div class="val" id="k-src">-</div></div>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="clickup">ClickUp</button>
      <button class="filter-btn" data-filter="github_pr">GitHub PR</button>
      <button class="filter-btn" data-filter="github_issue">GitHub Issue</button>
      <button class="filter-btn" data-filter="internal">Internal</button>
      <button class="filter-btn" data-filter="high">High Priority</button>
    </div>
    <div id="task-list" class="task-list"><div class="empty">Loading tasks...</div></div>
  </div>

  <script>
    window.__bootPromise = fetch('/web/api-token')
      .then(r => { if (!r.ok) throw new Error('Session expired'); return r.json(); })
      .then(d => d.token);
    let allTasks = [];
    let currentFilter = 'all';

    async function loadTasks() {
      const container = document.getElementById('task-list');
      try {
        const token = await window.__bootPromise;
        if (!token) throw new Error('Session expired');
        const h = {'Authorization': 'Bearer ' + token};
        const res = await fetch('/api/v1/tasks?limit=100&is_done=false', {headers:h});
        if (!res.ok) throw new Error('Failed to load tasks');
        allTasks = await res.json();
        updateKPIs();
        renderTasks();
      } catch (e) {
        container.innerHTML = '<div class="empty">Could not load tasks. Refresh and sign in again.</div>';
      }
    }

    function updateKPIs() {
      document.getElementById('k-open').textContent = allTasks.length;
      document.getElementById('k-high').textContent = allTasks.filter(t=>t.priority>=4).length;
      const sources = new Set(allTasks.map(t=>t.external_source||'internal'));
      document.getElementById('k-src').textContent = sources.size;
    }

    function renderTasks() {
      let filtered = allTasks;
      if (currentFilter === 'high') filtered = allTasks.filter(t=>t.priority>=4);
      else if (currentFilter === 'internal') filtered = allTasks.filter(t=>!t.external_source);
      else if (currentFilter !== 'all') filtered = allTasks.filter(t=>t.external_source===currentFilter);

      const container = document.getElementById('task-list');
      if (!filtered.length) { container.innerHTML = '<div class="empty">No tasks match this filter</div>'; return; }
      container.innerHTML = filtered.map(t => {
        const pClass = t.priority >= 4 ? 'p-high' : t.priority >= 3 ? 'p-med' : t.priority >= 2 ? 'p-low' : 'p-none';
        const src = t.external_source ? `<span class="task-source">${escHtml(t.external_source)}</span>` : '';
        const due = t.due_date ? ` &middot; due ${escHtml(t.due_date)}` : '';
        return `<div class="task-item${t.is_done?' task-done':''}">
          <div class="p-dot ${pClass}"></div>
          <div class="task-info">
            <div class="task-title">${escHtml(t.title)}</div>
            <div class="task-meta">P${t.priority}${due}${src}</div>
          </div>
        </div>`;
      }).join('');
    }

    function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    document.querySelector('.filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTasks();
    });

    loadTasks();

    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) logoutBtn.addEventListener('click', async () => {
      const csrf = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('pc_csrf='));
      const csrfVal = csrf ? csrf.split('=')[1] : '';
      try {
        const r = await fetch('/web/logout', {method:'POST', headers:{'Content-Type':'application/json','X-CSRF-Token':csrfVal}});
        if (!r.ok) throw new Error('Logout failed');
        window.location.href = '/web/login';
      } catch (_e) {
        alert('Logout failed. Please try again.');
      }
    });

    if (typeof lucide !== "undefined") lucide.createIcons();
  </script>
  <script src="/static/js/mobile-nav.js"></script>
</body>
</html>
