<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Command Center — Personal Clone by Nidin Nover" />
  <meta name="theme-color" content="#18181b" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Tasks — Nidin Nover</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/tasks.css" />
  <script nonce="{{ csp_nonce }}" src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
</head>
<body>
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="sb-pulse"></div>
      <div>
        <div class="sb-name">Nidin Nover</div>
        <div class="sb-sub">Command Center</div>
      </div>
    </div>
    <div class="sb-nav">
      <a href="/" class="sb-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a href="/web/talk" class="sb-item"><i data-lucide="message-circle"></i> Talk Mode</a>
      <a href="/web/integrations" class="sb-item"><i data-lucide="plug"></i> Integrations</a>
      <a href="/web/data-hub" class="sb-item"><i data-lucide="database"></i> Data Hub</a>
      <a href="/web/observe" class="sb-item"><i data-lucide="activity"></i> Observe</a>
      <a href="/web/ops-intel" class="sb-item"><i data-lucide="bar-chart-3"></i> Ops Intel</a>
      <a href="/web/tasks" class="sb-item active"><i data-lucide="check-square"></i> Tasks</a>
      <div class="sb-divider"></div>
      <a href="/docs" class="sb-item" target="_blank"><i data-lucide="book-open"></i> API Docs</a>
    </div>
    <div class="sb-footer">
      <button class="theme-toggle" type="button">
        <i data-lucide="moon" class="theme-icon"></i> Toggle theme
      </button>
      <button class="sb-item" id="logout-btn" type="button"><i data-lucide="log-out"></i> Sign out</button>
    </div>
  </nav>

  <div class="main-wrap">
    <h1>Task Inbox</h1>
    <div class="kpi-row">
      <div class="kpi"><div class="label">Open</div><div class="val" id="k-open">0</div></div>
      <div class="kpi"><div class="label">High Priority</div><div class="val" id="k-high">0</div></div>
      <div class="kpi"><div class="label">Sources</div><div class="val" id="k-src">-</div></div>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="clickup">ClickUp</button>
      <button class="filter-btn" data-filter="github_pr">GitHub PR</button>
      <button class="filter-btn" data-filter="github_issue">GitHub Issue</button>
      <button class="filter-btn" data-filter="internal">Internal</button>
      <button class="filter-btn" data-filter="high">High Priority</button>
    </div>
    <div id="task-list" class="task-list"><div class="empty">Loading tasks...</div></div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/ui-utils.js"></script>
  
  <script nonce="{{ csp_nonce }}" src="/static/js/mobile-nav.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/theme-toggle.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/search-palette.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/tasks-page.js"></script>
</body>
</html>
