<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Strategy Workspace — Nidin BOS" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Strategy — Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <link rel="stylesheet" href="/static/css/strategy.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
</head>
<body>
{% set active_page = "strategy" %}
{% include "partials/sidebar.html" %}

<main class="strategy-main">
  <!-- Header -->
  <header class="strategy-header">
    <div class="strategy-header-left">
      <h1 class="strategy-title">Strategy Workspace</h1>
      <p class="strategy-sub">Deep thinking with ChatGPT — decisions flow to your business agent</p>
    </div>
    <span class="provider-badge"><i data-lucide="sparkles"></i> Powered by ChatGPT</span>
  </header>

  <div class="strategy-grid">
    <!-- LEFT: Chat Panel -->
    <section class="panel strategy-chat-panel">
      <div class="panel-head">
        <i data-lucide="brain"></i>
        <span>Strategy Chat</span>
      </div>
      <div id="chat-log" class="strategy-chat-log"></div>
      <div class="strategy-composer">
        <textarea id="message-input" rows="2" placeholder="Think out loud... what strategic question is on your mind?" aria-label="Strategy message"></textarea>
        <button id="send-btn" type="button" aria-label="Send message"><i data-lucide="send"></i></button>
      </div>
    </section>

    <!-- RIGHT: Side Panel -->
    <aside class="strategy-side">
      <!-- Push Decision -->
      <section class="panel strategy-section">
        <div class="panel-head"><i data-lucide="arrow-right-circle"></i> Push Decision to Agent</div>
        <div class="strategy-section-body">
          <textarea id="decision-input" rows="3" placeholder="Type a decision to send to business agent..." aria-label="Decision text"></textarea>
          <button id="push-decision-btn" class="btn-strategy" type="button">Push Decision</button>
        </div>
      </section>

      <!-- Strategy Rules -->
      <section class="panel strategy-section">
        <div class="panel-head"><i data-lucide="shield"></i> Strategy Rules</div>
        <div class="strategy-section-body">
          <div id="rules-list" class="strategy-list"></div>
          <div class="strategy-rule-form">
            <input id="rule-key" type="text" placeholder="Rule name (e.g. pricing)" aria-label="Rule name" />
            <textarea id="rule-value" rows="2" placeholder="Rule content..." aria-label="Rule content"></textarea>
            <button id="save-rule-btn" class="btn-strategy btn-sm" type="button">Save Rule</button>
          </div>
        </div>
      </section>

      <!-- Strategy Memory -->
      <section class="panel strategy-section">
        <div class="panel-head"><i data-lucide="database"></i> What I Remember</div>
        <div class="strategy-section-body">
          <div id="memory-list" class="strategy-list"></div>
        </div>
      </section>

      <!-- Suggested Prompts -->
      <section class="panel strategy-section">
        <div class="panel-head"><i data-lucide="zap"></i> Strategy Prompts</div>
        <div class="strategy-section-body">
          <div id="prompt-list" class="strategy-prompts"></div>
        </div>
      </section>
    </aside>
  </div>
</main>

<div id="toast-container"></div>

<script nonce="{{ csp_nonce }}" src="/static/js/ui-utils.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/mobile-nav.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/theme-toggle.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/search-palette.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/strategy-page.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/pwa.js"></script>
<script nonce="{{ csp_nonce }}">if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
