<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Deal Pipeline — Nidin BOS" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Deals — Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
</head>
<body>
  {% set active_page = "deals" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header">
      <h1>Deal Pipeline</h1>
      <button class="btn btn-primary" id="btn-new-deal">+ New Deal</button>
    </div>

    <!-- KPI Row -->
    <div class="kpi-row">
      <div class="kpi"><div class="label">Total Deals</div><div class="val" id="k-total">0</div></div>
      <div class="kpi"><div class="label">Pipeline Value</div><div class="val" id="k-value">$0</div></div>
      <div class="kpi"><div class="label">Won Revenue</div><div class="val" id="k-won">$0</div></div>
      <div class="kpi"><div class="label">Win Rate</div><div class="val" id="k-winrate">0%</div></div>
      <div class="kpi"><div class="label">Avg Deal Size</div><div class="val" id="k-avg">$0</div></div>
    </div>

    <!-- Pipeline Stages -->
    <div class="card" style="margin-top:1.5rem">
      <h2 style="margin-bottom:1rem">Pipeline by Stage</h2>
      <div id="pipeline-stages" style="display:flex;gap:0.5rem;flex-wrap:wrap"></div>
    </div>

    <!-- Filter -->
    <div style="display:flex;gap:1rem;align-items:center;margin:1.5rem 0">
      <select id="filter-stage" class="input" style="width:auto">
        <option value="">All Stages</option>
        <option value="discovery">Discovery</option>
        <option value="proposal">Proposal</option>
        <option value="negotiation">Negotiation</option>
        <option value="contract">Contract</option>
        <option value="won">Won</option>
        <option value="lost">Lost</option>
      </select>
    </div>

    <!-- Deals Table -->
    <div class="card">
      <table class="data-table" id="deals-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Stage</th>
            <th>Value</th>
            <th>Probability</th>
            <th>Expected Close</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody id="deals-body"></tbody>
      </table>
      <p id="empty-msg" class="empty-state" style="display:none">No deals found.</p>
    </div>
  </div>

  <!-- New Deal Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal-card">
      <h2>New Deal</h2>
      <form id="deal-form">
        <label>Title <input class="input" name="title" required maxlength="300" /></label>
        <label>Value ($) <input class="input" name="value" type="number" step="0.01" min="0" value="0" /></label>
        <label>Stage
          <select class="input" name="stage">
            <option value="discovery">Discovery</option>
            <option value="proposal">Proposal</option>
            <option value="negotiation">Negotiation</option>
            <option value="contract">Contract</option>
          </select>
        </label>
        <label>Probability (%)
          <input class="input" name="probability" type="number" min="0" max="100" value="0" />
        </label>
        <label>Expected Close Date <input class="input" name="expected_close_date" type="date" /></label>
        <label>Description <textarea class="input" name="description" rows="2" maxlength="2000"></textarea></label>
        <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem">
          <button type="button" class="btn" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/deals-page.js"></script>
  <script nonce="{{ csp_nonce }}">lucide.createIcons();</script>
</body>
</html>
