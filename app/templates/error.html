<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5f5f7" id="error-theme-meta" />
  <script>
    (function(){
      try {
        var stored = localStorage.getItem('pc_theme:professional');
        if (stored === 'dark' || stored === 'light') {
          document.documentElement.setAttribute('data-theme', stored);
          var m = document.getElementById('error-theme-meta');
          if (m) m.content = stored === 'dark' ? '#000000' : '#f5f5f7';
        }
      } catch (e) {}
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>{{ code }} — Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
</head>
<body class="error-page">
  <div class="error-page-card">
    <div class="error-page-brand">
      <span class="error-page-name">Nidin BOS</span>
    </div>
    <p class="error-page-sub">AI Agent Factory</p>
    <h1 class="error-page-title">{{ 'Page not found' if code == 404 else 'Something went wrong' }}</h1>
    <div class="error-page-code" aria-hidden="true">{{ code }}</div>
    <p class="error-page-msg">{{ message }}</p>
    <a href="/" class="btn btn-primary">Back to Dashboard</a>
  </div>
</body>
</html>
