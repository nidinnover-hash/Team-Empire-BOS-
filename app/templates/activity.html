<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Agent Factory — Nidin BOS" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Audit Log — Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <link rel="stylesheet" href="/static/css/activity.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
  <link rel="stylesheet" href="/static/css/bos-design-system.css">
</head>
<body>
  {% set active_page = "audit" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header">
      <h1>Audit Log</h1>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="label">Total Events</div><div class="val" id="k-total">0</div></div>
      <div class="kpi"><div class="label">High Risk</div><div class="val" id="k-high">0</div></div>
      <div class="kpi"><div class="label">Today</div><div class="val" id="k-today">0</div></div>
    </div>

    <div class="filter-bar">
      <input type="text" id="filter-search" placeholder="Search events..." />
      <select id="filter-event-type">
        <option value="">All event types</option>
      </select>
      <select id="filter-entity-type">
        <option value="">All entities</option>
      </select>
      <input type="date" id="filter-date" />
      <button class="btn-secondary" id="filter-apply" type="button">Apply</button>
      <button class="btn-secondary" id="filter-reset" type="button">Reset</button>
    </div>

    <div id="event-list" class="event-list"><div class="empty loading">Loading audit events...</div></div>

    <div class="pagination" id="pagination"></div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/ui-utils.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/mobile-nav.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/theme-toggle.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/search-palette.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/activity-page.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/pwa.js"></script>
</body>
</html>
