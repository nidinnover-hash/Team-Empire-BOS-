<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Agent Factory — Nidin BOS" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Notifications — Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <link rel="stylesheet" href="/static/css/notifications.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
  <link rel="stylesheet" href="/static/css/bos-design-system.css">
</head>
<body>
  {% set active_page = "notifications" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header">
      <h1>Notification Center</h1>
      <button class="btn-primary" id="mark-all-read-btn" type="button">Mark All Read</button>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="label">Total</div><div class="val" id="k-total">0</div></div>
      <div class="kpi"><div class="label">Unread</div><div class="val" id="k-unread">0</div></div>
      <div class="kpi"><div class="label">Critical</div><div class="val" id="k-critical">0</div></div>
    </div>

    <div class="filter-bar">
      <select id="filter-severity">
        <option value="">All severities</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="warning">Warning</option>
        <option value="info">Info</option>
      </select>
      <label class="filter-check">
        <input type="checkbox" id="filter-unread" /> Unread only
      </label>
    </div>

    <div id="notif-list" class="notif-page-list"><div class="empty loading">Loading notifications...</div></div>

    <div class="pagination" id="pagination"></div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/ui-utils.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/mobile-nav.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/theme-toggle.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/search-palette.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/notifications-page.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/pwa.js"></script>
</body>
</html>
