<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Agent Factory - Nidin BOS" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Clone Personas - Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
</head>
<body>
  {% set active_page = "personas" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header"><h1>Clone Personas</h1></div>

    <div class="kpi-row">
      <div class="kpi"><div class="label">Total Clones</div><div class="val" id="k-total">0</div></div>
      <div class="kpi"><div class="label">Avg AI Level</div><div class="val" id="k-ai">0</div></div>
      <div class="kpi"><div class="label">Ready</div><div class="val" id="k-ready">0</div></div>
    </div>

    <div class="card" style="margin-top:1.5rem">
      <h3>Employee Clone Profiles</h3>
      <table class="data-table" id="clone-table">
        <thead><tr><th>Employee</th><th>Role</th><th>Readiness</th><th>AI Level</th><th>Confidence</th></tr></thead>
        <tbody id="clone-body"><tr><td colspan="5" style="text-align:center;opacity:.5">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/ui-utils.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/personas-page.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/search-palette.js"></script>
</body>
</html>
