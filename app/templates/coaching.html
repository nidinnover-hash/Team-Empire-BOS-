<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Agent Factory - Nidin BOS" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>AI Coaching - Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
  <link rel="stylesheet" href="/static/css/bos-design-system.css">
</head>
<body>
  {% set active_page = "coaching" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header">
      <h1>AI Coaching Reports</h1>
      <button class="btn-primary" id="generate-btn" type="button">Generate Report</button>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="label">Reports</div><div class="val" id="k-total">0</div></div>
      <div class="kpi"><div class="label">Approval Rate</div><div class="val" id="k-score">--</div></div>
      <div class="kpi"><div class="label">Pending Approval</div><div class="val" id="k-pending">0</div></div>
    </div>

    <div class="card" style="margin-top:1.5rem">
      <h3>Recent Coaching Reports</h3>
      <table class="data-table" id="report-table">
        <thead><tr><th>Employee</th><th>Type</th><th>Status</th><th>Recommendations</th><th>Generated</th></tr></thead>
        <tbody id="report-body"><tr><td colspan="5" style="text-align:center;opacity:.5">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/ui-utils.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/coaching-page.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/search-palette.js"></script>
</body>
</html>
