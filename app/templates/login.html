<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nidin Nover</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem 2rem;
      width: 100%; max-width: 380px;
      box-shadow: var(--shadow-md);
    }
    .login-brand {
      display: flex; align-items: center; gap: .7rem;
      margin-bottom: .35rem; justify-content: center;
    }
    .login-pulse {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 0 rgba(34,197,94,.3);
      animation: sb-pulse 2.4s infinite;
      flex-shrink: 0;
    }
    .login-name { font-size: 1.15rem; font-weight: 700; color: var(--text); }
    .login-sub {
      text-align: center; font-size: .72rem; color: var(--text-faint);
      margin-bottom: 2rem; letter-spacing: .04em;
    }
    .login-card label { text-transform: none; letter-spacing: 0; font-weight: 500; }
    .login-card input { margin-bottom: 1rem; }
    .login-card button {
      width: 100%; padding: .6rem;
      font-size: .82rem; font-weight: 600;
      background: var(--brand); color: #fff;
      border: 1px solid var(--brand);
      border-radius: var(--radius-sm);
      cursor: pointer; transition: background .15s;
      font-family: var(--font);
    }
    .login-card button:hover { background: var(--brand-hover); }
    .error {
      background: var(--danger-soft);
      border: 1px solid var(--danger-border);
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: .55rem .7rem; font-size: .78rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-pulse"></div>
      <span class="login-name">Nidin Nover</span>
    </div>
    <div class="login-sub">AI Command Center</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form id="login-form">
      <label for="username">Email</label>
      <input id="username" name="username" type="email" autocomplete="username" autofocus required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit">Sign in</button>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const body = new FormData(form);
      try {
        const res = await fetch('/web/login', { method: 'POST', body });
        if (res.ok) { window.location.href = '/'; return; }
        const data = await res.json().catch(() => ({}));
        let msg = data.detail || 'Invalid email or password.';
        let err = document.querySelector('.error');
        if (!err) { err = document.createElement('div'); err.className = 'error'; form.prepend(err); }
        err.textContent = msg;
      } catch (_e) {
        let err = document.querySelector('.error');
        if (!err) { err = document.createElement('div'); err.className = 'error'; form.prepend(err); }
        err.textContent = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
