<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Command Center — Nidin Nover AI" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Sign In — Nidin Nover</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/login.css" />
  
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-pulse"></div>
      <span class="login-name">Nidin Nover</span>
    </div>
    <div class="login-sub">AI Command Center</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form id="login-form">
      <label for="username">Email</label>
      <input id="username" name="username" type="email" autocomplete="username" autofocus required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <div id="mfa-field" style="display:none">
        <label for="totp_code">Authenticator Code</label>
        <input id="totp_code" name="totp_code" type="text" inputmode="numeric"
               pattern="\d{6}" maxlength="6" autocomplete="one-time-code"
               placeholder="6-digit code" />
      </div>

      <button type="submit">Sign in</button>
    </form>
  </div>

  
<script nonce="{{ csp_nonce }}" src="/static/js/login-page.js"></script>
</body>
</html>
