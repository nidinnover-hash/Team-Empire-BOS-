<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nidin Nover</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/login.css" />
  
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-pulse"></div>
      <span class="login-name">Nidin Nover</span>
    </div>
    <div class="login-sub">AI Command Center</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form id="login-form">
      <label for="username">Email</label>
      <input id="username" name="username" type="email" autocomplete="username" autofocus required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit">Sign in</button>
    </form>
  </div>

  
<script nonce="{{ csp_nonce }}" src="/static/js/login-page.js"></script>
</body>
</html>
