<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Agent Factory — Nidin BOS" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Integration Health — Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <link rel="stylesheet" href="/static/css/health.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
</head>
<body>
  {% set active_page = "health" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header">
      <h1>Integration Health</h1>
      <button class="btn-secondary" id="refresh-btn" type="button">Refresh</button>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="label">Healthy</div><div class="val ok" id="k-healthy">0</div></div>
      <div class="kpi"><div class="label">Degraded</div><div class="val warn" id="k-degraded">0</div></div>
      <div class="kpi"><div class="label">Down</div><div class="val danger" id="k-down">0</div></div>
      <div class="kpi"><div class="label">Total</div><div class="val" id="k-total">0</div></div>
    </div>

    <h2 class="section-title">Integrations</h2>
    <div id="integration-list" class="health-list"><div class="empty loading">Loading integration health...</div></div>

    <h2 class="section-title">Token Health</h2>
    <div id="token-list" class="health-list"><div class="empty loading">Loading token health...</div></div>

    <h2 class="section-title">System Health</h2>
    <div id="system-list" class="health-list"><div class="empty loading">Loading system health...</div></div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/ui-utils.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/mobile-nav.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/theme-toggle.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/search-palette.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/health-page.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/pwa.js"></script>
</body>
</html>
