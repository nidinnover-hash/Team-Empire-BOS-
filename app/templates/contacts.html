<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Contacts - Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
</head>
<body>
  {% set active_page = "contacts" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header">
      <h1>Contacts</h1>
      <button class="btn-primary" id="add-btn" type="button">+ Add Contact</button>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="label">Total</div><div class="val" id="k-total">0</div></div>
      <div class="kpi"><div class="label">Business</div><div class="val" id="k-biz">0</div></div>
      <div class="kpi"><div class="label">Personal</div><div class="val" id="k-per">0</div></div>
    </div>
    <div class="card" style="margin-top:1.5rem">
      <table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Type</th><th>Phone</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="5" style="text-align:center;opacity:.5">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
  <script nonce="{{ csp_nonce }}" src="/static/js/ui-utils.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/contacts-page.js"></script>
</body>
</html>
