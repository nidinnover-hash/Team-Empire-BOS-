{% extends "base.html" %}
{% block active_page %}goals{% endblock %}
{% block title %}Goals — Nidin BOS{% endblock %}

{% block content %}
  <div class="main-wrap" id="main-content">
    <div class="page-header">
      <h1>Goals</h1>
      <button class="btn-primary" id="add-btn" type="button">+ New Goal</button>
    </div>
    <div class="kpi-row stagger-enter">
      <div class="kpi"><div class="label">Total</div><div class="val" id="k-total">0</div></div>
      <div class="kpi"><div class="label">Active</div><div class="val" id="k-active">0</div></div>
      <div class="kpi"><div class="label">Completed</div><div class="val" id="k-done">0</div></div>
    </div>
    <div class="card card-spaced">
      <table class="data-table">
        <thead><tr><th>Title</th><th>Category</th><th>Progress</th><th>Status</th><th>Target Date</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="5" class="table-placeholder">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
<script nonce="{{ csp_nonce }}" src="/static/js/goals-page.js"></script>
{% endblock %}
