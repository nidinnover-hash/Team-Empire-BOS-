<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Governance Dashboard — Nidin BOS" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Governance — Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <link rel="stylesheet" href="/static/css/governance.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
  <link rel="stylesheet" href="/static/css/bos-design-system.css">
</head>
<body>
  {% set active_page = "governance" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header">
      <h1>Governance & Compliance</h1>
      <div class="header-actions">
        <button class="btn-primary" id="btn-new-policy" type="button">New Policy</button>
        <button class="btn-secondary" id="btn-evaluate" type="button">Run Compliance Check</button>
      </div>
    </div>

    <!-- KPI Row -->
    <div class="kpi-row">
      <div class="kpi"><div class="label">Active Policies</div><div class="val" id="k-policies">0</div></div>
      <div class="kpi"><div class="label">Open Violations</div><div class="val" id="k-open">0</div></div>
      <div class="kpi"><div class="label">Resolved</div><div class="val" id="k-resolved">0</div></div>
      <div class="kpi"><div class="label">Compliance Rate</div><div class="val" id="k-rate">0%</div></div>
      <div class="kpi"><div class="label">Automation Level</div><div class="val" id="k-auto">5%</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab active" data-tab="policies" type="button" aria-label="Show policies">Policies</button>
      <button class="tab" data-tab="violations" type="button" aria-label="Show violations">Violations</button>
      <button class="tab" data-tab="automation" type="button" aria-label="Show automation">Automation</button>
    </div>

    <!-- Policies Panel -->
    <div id="panel-policies" class="panel">
      <div id="policy-list" class="item-list"><div class="empty loading">Loading policies...</div></div>
    </div>

    <!-- Violations Panel -->
    <div id="panel-violations" class="panel u-hidden">
      <div id="violation-list" class="item-list"><div class="empty loading">Loading violations...</div></div>
    </div>

    <!-- Automation Panel -->
    <div id="panel-automation" class="panel u-hidden">
      <div id="automation-content"><div class="empty loading">Loading...</div></div>
    </div>

    <!-- New Policy Modal -->
    <div id="modal-policy" class="modal-overlay u-hidden">
      <div class="modal">
        <div class="modal-header">
          <h2>New Governance Policy</h2>
          <button class="modal-close" id="modal-policy-close" type="button" aria-label="Close">&times;</button>
        </div>
        <form id="form-policy" class="modal-body">
          <label>Name <input type="text" name="name" required maxlength="200" /></label>
          <label>Type
            <select name="policy_type">
              <option value="general">General</option>
              <option value="performance">Performance</option>
              <option value="compliance">Compliance</option>
              <option value="security">Security</option>
              <option value="operational">Operational</option>
            </select>
          </label>
          <label>Description <textarea name="description" rows="2" maxlength="2000"></textarea></label>
          <label>Min Hours/Day <input type="number" name="min_hours" step="0.5" min="0" placeholder="e.g. 6" /></label>
          <label>Min Tasks/Day <input type="number" name="min_tasks" step="1" min="0" placeholder="e.g. 3" /></label>
          <label>Min Focus Ratio <input type="number" name="min_focus" step="0.05" min="0" max="1" placeholder="e.g. 0.4" /></label>
          <div class="modal-footer">
            <button type="submit" class="btn-primary">Create Policy</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/theme.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/api-client.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/governance-page.js"></script>
<script nonce="{{ csp_nonce }}" src="/static/js/search-palette.js"></script>
</body>
</html>
