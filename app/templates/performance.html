<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Performance Dashboard — Nidin BOS" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Performance — Nidin BOS</title>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/shared.css" />
  <link rel="stylesheet" href="/static/css/performance.css" />
  <script nonce="{{ csp_nonce }}" src="/static/js/lucide.min.js"></script>
</head>
<body>
  {% set active_page = "performance" %}
  {% include "partials/sidebar.html" %}

  <div class="main-wrap">
    <div class="page-header">
      <h1>Performance Dashboard</h1>
      <div class="header-actions">
        <button class="btn-primary" id="btn-coaching" type="button">AI Coaching</button>
        <button class="btn-secondary" id="btn-org-plan" type="button">Org Plan</button>
      </div>
    </div>

    <!-- KPI Row -->
    <div class="kpi-row">
      <div class="kpi"><div class="label">Employees</div><div class="val" id="k-employees">0</div></div>
      <div class="kpi"><div class="label">Departments</div><div class="val" id="k-depts">0</div></div>
      <div class="kpi"><div class="label">Avg Hours/Day</div><div class="val" id="k-hours">0</div></div>
      <div class="kpi"><div class="label">Focus Ratio</div><div class="val" id="k-focus">0%</div></div>
      <div class="kpi"><div class="label">Tasks/Day</div><div class="val" id="k-tasks">0</div></div>
      <div class="kpi"><div class="label">Automation</div><div class="val" id="k-auto">5%</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab active" data-tab="org" type="button" aria-label="Show organization">Organization</button>
      <button class="tab" data-tab="departments" type="button" aria-label="Show departments">Departments</button>
      <button class="tab" data-tab="top" type="button" aria-label="Show top performers">Top Performers</button>
      <button class="tab" data-tab="alerts" type="button" aria-label="Show alerts">Alerts</button>
      <button class="tab" data-tab="learning" type="button" aria-label="Show learning">Learning</button>
    </div>

    <!-- Org Panel -->
    <div id="panel-org" class="panel">
      <div id="dept-cards" class="dept-grid"><div class="empty loading">Loading...</div></div>
    </div>

    <!-- Departments Panel -->
    <div id="panel-departments" class="panel" style="display:none">
      <div id="dept-detail" class="item-list"><div class="empty">Select a department...</div></div>
    </div>

    <!-- Top Performers Panel -->
    <div id="panel-top" class="panel" style="display:none">
      <div id="top-list" class="item-list"><div class="empty loading">Loading...</div></div>
    </div>

    <!-- Alerts Panel -->
    <div id="panel-alerts" class="panel" style="display:none">
      <div id="alert-list" class="item-list"><div class="empty loading">Loading...</div></div>
    </div>

    <!-- Learning Panel -->
    <div id="panel-learning" class="panel" style="display:none">
      <div id="learning-content"><div class="empty loading">Loading...</div></div>
    </div>
  </div>

  <script nonce="{{ csp_nonce }}" src="/static/js/theme.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/api-client.js"></script>
  <script nonce="{{ csp_nonce }}" src="/static/js/performance-page.js"></script>
</body>
</html>
