version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clone
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clone_dev_2026}
      POSTGRES_DB: personal_clone
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clone -d personal_clone"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clone:${DB_PASSWORD:-clone_dev_2026}@db:5432/personal_clone
      RATE_LIMIT_BACKEND: redis
      RATE_LIMIT_REDIS_URL: redis://redis:6379/0
      IDEMPOTENCY_BACKEND: redis
      IDEMPOTENCY_REDIS_URL: redis://redis:6379/1
    volumes:
      - ./alembic:/app/alembic

  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clone:${DB_PASSWORD:-clone_dev_2026}@db:5432/personal_clone
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: "no"

volumes:
  pgdata:
