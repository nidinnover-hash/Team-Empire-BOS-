[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [".venv", "alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "B"]
ignore = ["E501", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]

[tool.mypy]
python_version = "3.11"
pretty = true
show_error_codes = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
no_implicit_optional = true
exclude = ["alembic/versions/"]
follow_imports = "skip"
files = [
  "app/core",
  "app/services/ai_router.py",
  "app/services/email_service.py",
  "app/tools/gmail.py",
  "app/api/v1/endpoints/email.py",
  "app/api/v1/endpoints/integrations.py",
]

[[tool.mypy.overrides]]
module = [
  "google.*",
  "google_auth_oauthlib.*",
  "googleapiclient.*",
  "jwt",
  "anthropic",
  "groq",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
  "app.services.employee",
  "app.services.metrics_service",
  "app.services.policy_service",
  "app.services.report_service",
  "app.services.signal_ingestion",
]
disallow_untyped_defs = true
disallow_any_generics = true
warn_return_any = true
