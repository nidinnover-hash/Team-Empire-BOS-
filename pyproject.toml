[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [".venv", "alembic/versions"]

[tool.ruff.lint]
select = [
  "E",     # pycodestyle errors
  "F",     # pyflakes
  "B",     # flake8-bugbear
  "I",     # isort
  "UP",    # pyupgrade (modern Python syntax)
  "SIM",   # flake8-simplify
  "T20",   # flake8-print (no print statements)
  "RUF",   # ruff-specific rules
  "S110",  # flake8-bandit: try-except-pass
  "S112",  # flake8-bandit: try-except-continue
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "B008",   # function call in default arg (Depends())
  "RUF012", # mutable class vars (SQLAlchemy models)
  "UP007",  # X | Y syntax (already using it)
]

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]

[tool.mypy]
python_version = "3.11"
pretty = true
show_error_codes = true
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
disallow_untyped_defs = false
check_untyped_defs = true
no_implicit_optional = true
exclude = ["alembic/versions/"]
follow_imports = "normal"
files = [
  "app/core",
  "app/services",
  "app/api",
  "app/models",
]

[[tool.mypy.overrides]]
module = [
  "google.*",
  "google_auth_oauthlib.*",
  "googleapiclient.*",
  "opentelemetry.*",
  "pytesseract",
  "PIL.*",
  "pyotp",
  "qrcode",
  "jwt",
  "anthropic",
  "groq",
  "httpx",
  "httpx.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
  "app.services.employee",
  "app.services.metrics_service",
  "app.services.policy_service",
  "app.services.report_service",
  "app.services.signal_ingestion",
]
disallow_untyped_defs = true
disallow_any_generics = true
warn_return_any = true

# FastAPI endpoints return ORM models that are serialised via response_model;
# mypy sees a type mismatch (Model vs Schema) which is correct at the type
# level but handled at runtime by Pydantic's from_attributes.
[[tool.mypy.overrides]]
module = [
  "app.api.v1.endpoints.*",
]
disable_error_code = ["return-value"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-q -p no:cacheprovider"
