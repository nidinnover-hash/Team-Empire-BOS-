# Nginx config for clone.nidin.ai (Nidin Nover AI)
# Place at: /etc/nginx/sites-available/clone.nidin.ai
# Symlink:  ln -s /etc/nginx/sites-available/clone.nidin.ai /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name clone.nidin.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name clone.nidin.ai;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/clone.nidin.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clone.nidin.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (Nginx layer)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max upload size (for file uploads, data import)
    client_max_body_size 10M;

    # Static files — serve directly from Nginx (bypass Gunicorn)
    location /static/ {
        alias /opt/nidin-nover-ai/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health check (no auth, no logging)
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
